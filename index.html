<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="" type="image/x-icon">
    <title>Mass Adi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Style Judul */
        .title-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Style Waktu & Tanggal */
        .datetime-box {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Tab Container */
        .nav-container { 
            display: flex; 
            background: rgba(15, 23, 42, 0.9); 
            border-radius: 1.5rem; 
            padding: 6px; 
            gap: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 500px;
        }

/* Efek Animasi Tab */
        .nav-tab { 
            flex: 1; 
            padding: 12px 5px; 
            border-radius: 1.2rem; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #64748b; 
            text-align: center;
            cursor: pointer;
            /* Animasi transisi halus di sini */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .nav-tab.active { 
            background: #3b82f6; 
            color: white; 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px); /* Efek angkat dikit pas aktif */
        }

        /* Animasi klik (tekan) */
        .nav-tab:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <h1 class="title-name">Mass Adi</h1>

    <div id="datetime" class="datetime-box">
        Loading waktu...
    </div>

    <div class="nav-container">
        <button class="nav-tab active" onclick="switchTab(this)">Game</button>
        <button class="nav-tab" onclick="switchTab(this)">Download</button>
        <button class="nav-tab" onclick="switchTab(this)">Media</button>
        <button class="nav-tab" onclick="switchTab(this)">Streaming</button>
        <button class="nav-tab" onclick="switchTab(this)">System</button>
    </div>
<section id="game" class="section-content active">
    <div class="glass p-7 rounded-[2.5rem] space-y-6 max-w-md mx-auto">
        
        <div class="relative">
            <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 px-2">Select Game</p>
            <div onclick="toggleGameDropdown()" id="gameSelector" class="input-field flex justify-between items-center cursor-pointer border-blue-500/30">
                <span id="selectedGameText" class="font-bold text-sm">MOBILE LEGENDS</span>
                <span id="gameArrow" class="text-xs transition-transform duration-300">▼</span>
            </div>

            <div id="gameOptions" class="hidden absolute top-full left-0 right-0 mt-2 glass rounded-2xl overflow-hidden z-50 animate__animated animate__fadeIn">
                <div onclick="selectGame('emel', 'MOBILE LEGENDS', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase border-b border-white/5">Mobile Legends</div>
                <div onclick="selectGame('epep', 'FREE FIRE', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase border-b border-white/5">Free Fire</div>
                <div onclick="selectGame('pubg', 'PUBG MOBILE', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase border-b border-white/5">PUBG Mobile</div>
                <div onclick="selectGame('codm', 'CALL OF DUTY MOBILE', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase border-b border-white/5">Call Of Duty Mobile</div>
                <div onclick="selectGame('fcmobile', 'FC MOBILE', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase border-b border-white/5">FC Mobile</div>
                <div onclick="selectGame('mcgg', 'MINECRAFT GAME', this)" class="p-4 hover:bg-blue-600/20 cursor-pointer font-bold text-xs uppercase">Minecraft Game</div>
            </div>
        </div>

        <input type="hidden" id="gameType" value="emel">

        <div class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="gameId" placeholder="User ID" class="input-field flex-1">
                <input type="text" id="gameZone" placeholder="Zone ID" class="input-field w-28">
            </div>

            <button onclick="validateGame()" id="btnCheck" class="w-full py-5 bg-blue-600 rounded-2xl font-black text-[13px] tracking-widest uppercase shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
                Check Username
            </button>
        </div>
    </div>
</section>
    <script> // Fungsi update waktu real-time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateStr = now.toLocaleDateString('id-ID', options);
            const timeStr = now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            document.getElementById('datetime').innerHTML = `${dateStr} | ${timeStr}`;
        }

        // Jalankan waktu setiap detik
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Fungsi pindah tab sederhana
        function switchTab(btn) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
   <script> // Fungsi Dropdown Pilih Game
    function toggleGameDropdown() {
        const menu = document.getElementById('gameOptions');
        const arrow = document.getElementById('gameArrow');
        menu.classList.toggle('hidden');
        arrow.style.transform = menu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function selectGame(val, label, el) {
        // Set nilai ke hidden input
        document.getElementById('gameType').value = val;
        // Ganti teks di tombol dropdown
        document.getElementById('selectedGameText').innerText = label;
        
        // Tutup dropdown
        toggleGameDropdown();

        // Logic Zone ID (Hanya MLBB & Minecraft)
        const zoneInput = document.getElementById('gameZone');
        if (val === 'emel' || val === 'mcgg') {
            zoneInput.style.display = 'block';
            zoneInput.placeholder = (val === 'emel') ? "Zone ID" : "Server";
        } else {
            zoneInput.style.display = 'none';
            zoneInput.value = '';
        }
    }

    // <script> // Fungsi validasi nembak folder /api/ lu
    async function validateGame() {
        const btn = document.getElementById('btnCheck');
        const game = document.getElementById('gameType').value;
        const id = document.getElementById('gameId').value;
        const zone = document.getElementById('gameZone').value;

        if (!id) return alert("User ID wajib diisi!");

        btn.disabled = true;
        btn.innerText = "WAIT...";

        try {
            let url = `/api/${game}?id=${id}`;
            if (zone && (game === 'emel' || game === 'mcgg')) url += `&zone=${zone}`;

            const response = await fetch(url);
            const data = await response.json();
            
            // Ambil nama + negara kalau ada (Khusus MLBB)
            const nickname = data.username || (data.data && data.data.username);
            const country = data.country || (data.data && data.data.country);

            if (nickname) {
                alert("Account: " + nickname + (country ? " (" + country + ")" : ""));
            } else {
                alert("ID Gak Ketemu di Folder API!");
            }
        } catch (e) {
            alert("Error Server!");
        } finally {
            btn.disabled = false;
            btn.innerText = "CHECK USERNAME";
        }
    }
</script>
</body>
</html>
