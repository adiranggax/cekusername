<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: #0f172a; 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: white; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .input-glow:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .float-logo { animation: float 4s ease-in-out infinite; }
        
        /* Transisi halus untuk Zone ID biar gak kaget */
        #zonebox { transition: all 0.4s ease-in-out; }
        .hidden-zone { opacity: 0; transform: translateY(-20px); pointer-events: none; max-height: 0; margin-bottom: 0; overflow: hidden; }
        .show-zone { opacity: 1; transform: translateY(0); max-height: 100px; margin-bottom: 1.25rem; }
    </style>
</head>
<body class="p-5 flex items-center justify-center">

    <div class="max-w-md w-full glass-card p-8 rounded-[2.5rem] animate__animated animate__fadeInUp">
        
        <div class="text-center mb-10">
            <div class="text-6xl mb-4 float-logo">🎮</div>
            <h1 class="text-3xl font-black tracking-tighter bg-gradient-to-r from-blue-400 via-indigo-300 to-emerald-400 bg-clip-text text-transparent">
                GAME CHECKER
            </h1>
            <div class="h-1 w-20 bg-blue-500 mx-auto mt-2 rounded-full opacity-50"></div>
        </div>
        
        <div class="space-y-5">
            <div class="animate__animated animate__fadeInDown" style="animation-delay: 0.1s">
                <label class="block text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] ml-1 mb-2">Platform</label>
                <select id="game" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none input-glow transition-all cursor-pointer text-sm">
                    <option value="emel">Mobile Legends</option>
                    <option value="epep">Free Fire</option>
                    <option value="pubg">PUBG Mobile</option>
                    <option value="codm">CODM</option>
                    <option value="fcmobile">FC Mobile</option>
                    <option value="mcgg">Magic Chess Go Go</option>
                </select>
            </div>

            <div class="animate__animated animate__fadeInDown" style="animation-delay: 0.2s">
                <label class="block text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] ml-1 mb-2">User ID</label>
                <input type="text" id="userid" placeholder="Contoh: 12345678" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none input-glow transition-all text-sm">
            </div>

            <div id="zonebox" class="show-zone transition-all">
                <label class="block text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] ml-1 mb-2">Zone ID</label>
                <input type="text" id="zoneid" placeholder="Contoh: 1234" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none input-glow transition-all text-sm">
            </div>

            <button onclick="checkUser()" id="btnCheck" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-2xl font-black text-sm tracking-widest text-white transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                PERIKSA SEKARANG
            </button>
        </div>

        <div id="result" class="mt-8 hidden">
            <div class="p-1 rounded-3xl bg-gradient-to-r from-blue-500 via-emerald-500 to-indigo-500 animate__animated animate__pulse animate__infinite animate__slow">
                <div class="bg-slate-900 p-6 rounded-[1.4rem] text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-2">Username Ditemukan</p>
                    <div id="username" class="text-2xl font-black text-white break-words"></div>
                    
                    <div id="flagbox" class="mt-4 flex justify-center items-center gap-2 hidden border-t border-slate-800 pt-4">
                        <img id="flagimg" src="" class="w-7 h-4 rounded-sm shadow-md">
                        <span id="country" class="uppercase text-[10px] font-black text-slate-400 tracking-widest"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameSelect = document.getElementById('game');
        const zoneBox = document.getElementById('zonebox');

        gameSelect.addEventListener('change', () => {
            const needZone = ['emel', 'mcgg'];
            if (needZone.includes(gameSelect.value)) {
                zoneBox.classList.remove('hidden-zone');
                zoneBox.classList.add('show-zone');
            } else {
                zoneBox.classList.remove('show-zone');
                zoneBox.classList.add('hidden-zone');
            }
        });

        async function checkUser() {
            const game = gameSelect.value;
            const id = document.getElementById('userid').value;
            const zone = document.getElementById('zoneid').value;
            const btn = document.getElementById('btnCheck');
            const resDiv = document.getElementById('result');
            const userText = document.getElementById('username');
            const flagBox = document.getElementById('flagbox');

            if (!id) return alert('Input ID dulu bosku!');

            btn.innerHTML = 'MENGECEK...';
            btn.disabled = true;
            resDiv.classList.add('hidden');
            flagBox.classList.add('hidden');

            try {
                let url = `/api/${game}?id=${id}`;
                if (['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 200) {
                    userText.innerText = data.username;
                    resDiv.classList.remove('hidden');
                    resDiv.classList.add('animate__animated', 'animate__backInUp');

                    if (game === 'emel' && data.flag) {
                        document.getElementById('flagimg').src = data.flag;
                        document.getElementById('country').innerText = data.country;
                        flagBox.classList.remove('hidden');
                    }
                } else {
                    alert('ID Salah atau Tidak Ditemukan!');
                }
            } catch (err) {
                alert('Server Sibuk!');
            } finally {
                btn.innerText = 'PERIKSA SEKARANG';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
