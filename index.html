<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="" type="image/x-icon">
    <title>Mass Adi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Style Judul */
        .title-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Style Waktu & Tanggal */
        .datetime-box {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Tab Container */
        .nav-container { 
            display: flex; 
            background: rgba(15, 23, 42, 0.9); 
            border-radius: 1.5rem; 
            padding: 6px; 
            gap: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 500px;
        }

/* Efek Animasi Tab */
        .nav-tab { 
            flex: 1; 
            padding: 12px 5px; 
            border-radius: 1.2rem; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #64748b; 
            text-align: center;
            cursor: pointer;
            /* Animasi transisi halus di sini */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .nav-tab.active { 
            background: #3b82f6; 
            color: white; 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px); /* Efek angkat dikit pas aktif */
        }

        /* Animasi klik (tekan) */
        .nav-tab:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <h1 class="title-name">Mass Adi</h1>

    <div id="datetime" class="datetime-box">
        Loading waktu...
    </div>

    <div class="nav-container">
        <button class="nav-tab active" onclick="switchTab(this)">Game</button>
        <button class="nav-tab" onclick="switchTab(this)">Download</button>
        <button class="nav-tab" onclick="switchTab(this)">Media</button>
        <button class="nav-tab" onclick="switchTab(this)">Streaming</button>
        <button class="nav-tab" onclick="switchTab(this)">System</button>
    </div>
    <section id="game" class="section-content active animate__animated animate__fadeIn">
    <div class="glass p-6 rounded-[2.5rem] space-y-6">
        
        <div class="grid grid-cols-2 gap-3">
            <div onclick="setGame('emel', this)" class="game-card active-game">
                <span class="text-xl">⚔️</span>
                <p>Mobile Legends</p>
            </div>
            <div onclick="setGame('epep', this)" class="game-card">
                <span class="text-xl">🔥</span>
                <p>Free Fire</p>
            </div>
            <div onclick="setGame('pubg', this)" class="game-card">
                <span class="text-xl">🔫</span>
                <p>PUBG Mobile</p>
            </div>
            <div onclick="setGame('codm', this)" class="game-card">
                <span class="text-xl">🎖️</span>
                <p>Call Of Duty Mobile</p>
            </div>
            <div onclick="setGame('fcmobile', this)" class="game-card">
                <span class="text-xl">⚽</span>
                <p>FC Mobile</p>
            </div>
            <div onclick="setGame('mcgg', this)" class="game-card">
                <span class="text-xl">🧱</span>
                <p>Minecraft Game</p>
            </div>
        </div>

        <input type="hidden" id="gameType" value="emel">

        <div class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="gameId" placeholder="User ID" class="input-field flex-1">
                
                <input type="text" id="gameZone" placeholder="Zone ID" class="input-field w-28">
            </div>

            <button onclick="validateGame()" id="btnCheck" class="w-full py-5 bg-blue-600 rounded-2xl font-black text-sm uppercase shadow-lg shadow-blue-900/40">
                Check Username
            </button>
        </div>
    </div>

    <div id="resGame" class="hidden mt-4 p-6 glass rounded-[2.5rem] text-center">
        <h3 id="gameNickname" class="font-black text-xl uppercase italic text-blue-400"></h3>
    </div>
</section>
    <script> // Fungsi update waktu real-time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateStr = now.toLocaleDateString('id-ID', options);
            const timeStr = now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            document.getElementById('datetime').innerHTML = `${dateStr} | ${timeStr}`;
        }

        // Jalankan waktu setiap detik
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Fungsi pindah tab sederhana
        function switchTab(btn) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
    <script>
    // Fungsi khusus untuk handle response Nama + Negara (Khusus MLBB)
    async function validateGame() {
        const btn = document.getElementById('btnCheck');
        const resBox = document.getElementById('resGame');
        const resText = document.getElementById('gameNickname');
        
        const game = document.getElementById('gameType').value;
        const id = document.getElementById('gameId').value;
        const zone = document.getElementById('gameZone').value;

        if (!id) return alert("User ID wajib diisi!");

        btn.disabled = true;
        btn.innerHTML = "PROCESSING...";
        resBox.classList.add('hidden');

        try {
            // Jalur ke folder api lu
            let url = `/api/${game}?id=${id}`;
            if (zone && (game === 'emel' || game === 'mcgg')) url += `&zone=${zone}`;

            const response = await fetch(url);
            const data = await response.json();
            
            // Ambil data nickname & country dari API lu
            const nickname = data.username || (data.data && data.data.username) || data.nickname;
            const country = data.country || (data.data && data.data.country);

            if (nickname) {
                // LOGIC KHUSUS EMEL: Tampilkan Nama + Negara
                if (game === 'emel' && country) {
                    const countryLower = country.toLowerCase();
                    resText.innerHTML = `
                        <div class="flex flex-col items-center gap-2">
                            <img src="https://flagcdn.com/w80/${countryLower}.png" class="w-10 rounded shadow-sm mb-1">
                            <span>${nickname}</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${country}</span>
                        </div>
                    `;
                } else {
                    // Game lain cuma nama aja
                    resText.innerText = nickname;
                }
                
                resBox.classList.remove('hidden');
            } else {
                alert("ID Gak Ditemukan!");
            }
        } catch (err) {
            alert("Error nembak API!");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "CHECK USERNAME";
        }
    }
</script>
</body>
</html>
