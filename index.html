<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Checker Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS Murni untuk cegah glitch saat refresh */
        :root { --bg-dark: #0f172a; }
        
        body {
            background-color: var(--bg-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Animasi Masuk Tanpa Library */
        @keyframes revealCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            opacity: 0; /* Sembunyi dulu */
            animation: revealCard 0.6s ease-out forwards;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stagger-item {
            opacity: 0;
            animation: fadeInDown 0.4s ease-out forwards;
        }

        /* Delay Manual agar muncul satu-satu tanpa glitch */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.4s; }

        /* Logic Zone Box Smooth */
        #zonebox {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0;
        }

        #zonebox.active {
            max-height: 100px;
            opacity: 1;
            margin-bottom: 1rem;
            padding-top: 0.5rem;
        }

        input, select {
            -webkit-appearance: none;
            background: rgba(15, 23, 42, 0.6) !important;
        }

        .btn-check {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.2s;
        }

        .btn-check:active { transform: scale(0.96); }

        /* Mencegah highlight biru di HP */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-4">

    <div class="main-card max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl">
        
        <div class="text-center mb-8 stagger-item">
            <h1 class="text-3xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic">
                GAME CHECKER
            </h1>
            <div class="h-1 w-12 bg-blue-500 mx-auto mt-2 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
        </div>

        <div class="space-y-4">
            <div class="stagger-item delay-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1.5">Platform</label>
                <select id="game" class="w-full p-4 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 transition-all text-sm text-white">
                    <option value="emel">Mobile Legends</option>
                    <option value="epep">Free Fire</option>
                    <option value="pubg">PUBG Mobile</option>
                    <option value="codm">CODM</option>
                    <option value="fcmobile">FC Mobile</option>
                    <option value="mcgg">Magic Chess Go Go</option>
                </select>
            </div>

            <div class="stagger-item delay-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1.5">User ID</label>
                <input type="text" id="userid" inputmode="numeric" placeholder="Masukkan ID" class="w-full p-4 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 transition-all text-sm text-white">
            </div>

            <div id="zonebox" class="active">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-1.5">Zone ID</label>
                <input type="text" id="zoneid" inputmode="numeric" placeholder="Zone" class="w-full p-4 rounded-2xl border border-slate-700 outline-none focus:border-blue-500 transition-all text-sm text-white">
            </div>

            <button onclick="checkUser()" id="btnCheck" class="btn-check w-full py-4 rounded-2xl font-black text-xs tracking-widest uppercase shadow-lg shadow-blue-500/20 stagger-item delay-3">
                Cek Akun Sekarang
            </button>
        </div>

        <div id="result" class="mt-8 hidden overflow-hidden">
            <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-700 text-center animate-[fadeInDown_0.4s_ease-out]">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-2">Username Ditemukan</p>
                <div id="username" class="text-2xl font-black text-emerald-400 break-words uppercase"></div>
                
                <div id="flagbox" class="mt-4 flex justify-center items-center gap-2 hidden pt-4 border-t border-slate-800">
                    <img id="flagimg" src="" class="w-7 h-4 rounded-sm">
                    <span id="country" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameSelect = document.getElementById('game');
        const zoneBox = document.getElementById('zonebox');

        // Logic switch zone tanpa glitch
        gameSelect.addEventListener('change', () => {
            const needZone = ['emel', 'mcgg'];
            if (needZone.includes(gameSelect.value)) {
                zoneBox.classList.add('active');
            } else {
                zoneBox.classList.remove('active');
            }
        });

        async function checkUser() {
            const game = gameSelect.value;
            const id = document.getElementById('userid').value;
            const zone = document.getElementById('zoneid').value;
            const btn = document.getElementById('btnCheck');
            const resDiv = document.getElementById('result');
            const userText = document.getElementById('username');
            const flagBox = document.getElementById('flagbox');

            if (!id) return;

            btn.innerText = 'MEMPROSES...';
            btn.disabled = true;
            resDiv.classList.add('hidden');
            flagBox.classList.add('hidden');

            try {
                let url = `/api/${game}?id=${id}`;
                if (['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 200) {
                    userText.innerText = data.username;
                    resDiv.classList.remove('hidden');

                    if (game === 'emel' && data.flag) {
                        document.getElementById('flagimg').src = data.flag;
                        document.getElementById('country').innerText = data.country;
                        flagBox.classList.remove('hidden');
                    }
                } else {
                    alert('ID Tidak Ditemukan');
                }
            } catch (err) {
                alert('Gagal mengecek');
            } finally {
                btn.innerText = 'Cek Akun Sekarang';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
