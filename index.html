<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKYLEN ULTRA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Navigation Tab Style */
        .nav-tab {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .nav-tab.active {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* Input Style */
        .input-field {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: scale(1.01);
        }

        /* Smooth Animation for Zone Input */
        #zoneWrapper {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }
        #zoneWrapper.show {
            max-width: 200px;
            opacity: 1;
            pointer-events: auto;
            margin-left: 0.5rem;
        }

        /* Button Hover */
        .btn-primary {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:active { transform: scale(0.95); }
        
        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>
<body class="p-4 flex justify-center items-start">

    <div class="max-w-md w-full mt-4 space-y-6">
        
        <header class="text-center animate__animated animate__fadeInDown">
            <h1 class="text-4xl font-extrabold italic tracking-tighter text-blue-500 drop-shadow-lg">
                SKYLEN<span class="text-white">ULTRA</span>
            </h1>
            <p class="text-slate-500 text-[9px] tracking-[0.5em] uppercase font-bold mt-1">Next-Gen Tools System</p>
        </header>

        <nav class="grid grid-cols-4 p-1.5 glass rounded-2xl gap-1 animate__animated animate__fadeInUp">
            <button onclick="switchTab('game', this)" class="nav-tab active py-3 rounded-xl text-[9px] font-black uppercase">Game</button>
            <button onclick="switchTab('social', this)" class="nav-tab text-slate-400 py-3 rounded-xl text-[9px] font-black uppercase">Social</button>
            <button onclick="switchTab('cloud', this)" class="nav-tab text-slate-400 py-3 rounded-xl text-[9px] font-black uppercase">Cloud</button>
            <button onclick="switchTab('stats', this)" class="nav-tab text-slate-400 py-3 rounded-xl text-[9px] font-black uppercase">Stats</button>
        </nav>

        <main class="relative min-h-[400px]">
            
            <section id="game" class="section-content active animate__animated animate__fadeInRight">
                <div class="glass p-7 rounded-[2.5rem] space-y-5">
                    <div class="flex items-center gap-2 mb-2 text-blue-400 font-bold uppercase text-[11px] tracking-widest">
                        <span class="animate-pulse">🎮</span> ID Validator
                    </div>
                    
                    <select id="gameType" class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none cursor-pointer">
                        <option value="emel">Mobile Legends</option>
                        <option value="epep">Free Fire</option>
                        <option value="pubg">PUBG Mobile</option>
                        <option value="codm">Call of Duty Mobile</option>
                        <option value="eafc">EA Sports FC</option>
                        <option value="mcgg">Magic Chess Go Go</option>
                    </select>

                    <div class="flex items-center">
                        <input type="text" id="gameId" placeholder="Input User ID" class="input-field flex-1 p-4 rounded-2xl text-sm text-white outline-none">
                        <div id="zoneWrapper" class="show">
                            <input type="text" id="gameZone" placeholder="Zone" class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none">
                        </div>
                    </div>

                    <button id="btnCheck" onclick="validateGame()" class="btn-primary w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-[11px] tracking-widest shadow-xl shadow-blue-900/40">CHECK USERNAME</button>
                </div>

<div id="resGame" class="hidden mt-4 p-6 glass rounded-[2rem] text-center border-blue-500/30 animate__animated animate__bounceIn">
    <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-2">Validation Success</p>
    <div class="flex flex-col items-center justify-center gap-2">
        <img id="gameFlag" src="" class="w-12 h-auto rounded shadow-lg hidden mb-1">
        <h3 id="gameNickname" class="text-white font-black text-xl tracking-tighter italic uppercase"></h3>
    </div>
</div>
            </section>

<section id="social" class="section-content animate__animated animate__fadeInRight">
    <div class="glass p-7 rounded-[2.5rem] space-y-5">
        <div class="flex items-center gap-2 text-emerald-400 font-bold uppercase text-[11px] tracking-widest">
            <span>📲</span> Downloader Hub
        </div>

        <select id="socialType" class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none cursor-pointer bg-slate-900/50 border border-white/5">
            <option value="tiktok_video">TikTok Video (No WM)</option>
            <option value="tiktok_photo">TikTok Photo (Slide)</option>
            <option value="ig">Instagram</option>
            <option value="fb">Facebook</option>
            <option value="ytmp4">YouTube Video</option>
            <option value="ytmp3">YouTube Audio</option>
        </select>

        <input type="text" id="socialUrl" placeholder="Paste link media..." class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none bg-slate-900/50 border border-white/5">

        <button id="btnSocial" onclick="downloadSocial()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-black text-[11px] text-white tracking-widest shadow-xl shadow-emerald-900/40 transition-all active:scale-95 uppercase">
            START DOWNLOAD
        </button>

        <div id="resSocial" class="hidden mt-4 animate__animated animate__fadeIn">
            <div id="socialMediaContent" class="p-4 glass rounded-[2rem] border border-emerald-500/20">
                </div>
        </div>
    </div>
</section>

            <section id="cloud" class="section-content animate__animated animate__fadeInRight">
                <div class="glass p-7 rounded-[2.5rem] space-y-5">
                    <div class="flex items-center gap-2 text-purple-400 font-bold uppercase text-[11px] tracking-widest">
                        <span>☁️</span> Direct Bypass
                    </div>
                    <select class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none">
                        <option value="terabox">Terabox</option>
                        <option value="gdrive">Google Drive</option>
                        <option value="mfire">Mediafire</option>
                        <option value="videy">Videy.co</option>
                    </select>
                    <input type="text" placeholder="Paste file url..." class="input-field w-full p-4 rounded-2xl text-sm text-white outline-none">
                    <button class="w-full py-4 bg-purple-600 rounded-2xl font-black text-[11px] tracking-widest shadow-xl shadow-purple-900/40">GET LINK</button>
                </div>
            </section>

            <section id="stats" class="section-content animate__animated animate__fadeInRight">
                <div class="glass p-7 rounded-[2.5rem] space-y-5">
                    <div class="flex items-center gap-2 text-amber-500 font-bold uppercase text-[11px] tracking-widest">
                        <span>📊</span> Info Hub
                    </div>
                    <div class="space-y-3">
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-1">GSMArena Search</label>
                        <div class="flex gap-2">
                            <input type="text" placeholder="Cari Gadget..." class="input-field flex-1 p-3.5 rounded-xl text-sm text-white outline-none">
                            <button class="px-5 bg-amber-600 rounded-xl font-bold active:scale-90 transition-all">GO</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button class="p-4 bg-slate-900/80 border border-white/5 rounded-2xl text-center hover:border-amber-500 transition-all group">
                            <p class="text-[8px] text-slate-500 group-hover:text-amber-500 uppercase font-black">MPL ID</p>
                            <p class="text-[10px] font-bold">SCHEDULE</p>
                        </button>
                        <button class="p-4 bg-slate-900/80 border border-white/5 rounded-2xl text-center hover:border-amber-500 transition-all group">
                            <p class="text-[8px] text-slate-500 group-hover:text-amber-500 uppercase font-black">MPL ID</p>
                            <p class="text-[10px] font-bold">RANKING</p>
                        </button>
                    </div>
                </div>
            </section>

        </main>

        <footer class="text-center animate__animated animate__fadeInUp animate__delay-1s">
            <p class="text-slate-600 text-[9px] font-bold tracking-[0.4em] uppercase">© 2026 SKYLEN ULTRA ECOSYSTEM</p>
        </footer>

    </div>

    <script>
        // Smooth Tab Switcher
        function switchTab(target, btn) {
            // Animasi Keluar
            const current = document.querySelector('.section-content.active');
            current.classList.replace('animate__fadeInRight', 'animate__fadeOutLeft');
            
            setTimeout(() => {
                // Sembunyikan semua
                document.querySelectorAll('.section-content').forEach(s => {
                    s.classList.remove('active', 'animate__fadeOutLeft', 'animate__fadeInRight');
                });
                document.querySelectorAll('.nav-tab').forEach(t => {
                    t.classList.remove('active', 'text-white');
                    t.classList.add('text-slate-400');
                });

                // Tampilkan target dengan animasi masuk
                const targetSec = document.getElementById(target);
                targetSec.classList.add('active', 'animate__fadeInRight');
                btn.classList.add('active', 'text-white');
                btn.classList.remove('text-slate-400');
            }, 200);
        }

        // Logic Animasi Zone ID (Smooth Slide)
        document.getElementById('gameType').addEventListener('change', function() {
            const wrapper = document.getElementById('zoneWrapper');
            const isML = ['emel', 'mcgg'].includes(this.value);
            
            if (isML) {
                wrapper.classList.add('show');
            } else {
                wrapper.classList.remove('show');
            }
        });

        // Dummy Validate Function (Next Step: Masukkan API kamu di sini)
        function validateGame() {
            const btn = document.getElementById('btnCheck');
            const res = document.getElementById('resGame');
            btn.innerHTML = '<span class="animate-spin inline-block mr-2">↻</span> PLEASE WAIT...';
            
            // Contoh munculkan hasil
            setTimeout(() => {
                btn.innerHTML = 'CHECK USERNAME';
                res.classList.remove('hidden');
            }, 1000);
        }
    </script>
<script>
    const regionNames = new Intl.DisplayNames(['en'], {type: 'region'});

    async function validateGame() {
        const btn = document.getElementById('btnCheck');
        const resBox = document.getElementById('resGame');
        const resText = document.getElementById('gameNickname');
        const flagImg = document.getElementById('gameFlag');
        
        let game = document.getElementById('gameType').value; // Ambil value: emel, eafc, dll
        const id = document.getElementById('gameId').value;
        const zone = document.getElementById('gameZone').value;

        if (!id) return alert("User ID wajib diisi!");

        // --- LOGIKA MAPPING NAMA FILE ---
        // Jika pilih eafc, arahkan ke file fcmobile
        let fileName = game;
        if (game === 'eafc') fileName = 'fcmobile'; 
        // --------------------------------

        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin inline-block mr-2">↻</span> PROCESSING...';
        resBox.classList.add('hidden');
        flagImg.classList.add('hidden');

        try {
            // Tembak ke API lokal dengan nama file yang benar
            // Tambahkan .js jika server kamu mewajibkan ekstensi di URL
            let url = `/api/${fileName}?id=${id}`; 
            
            if (zone && ['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

            const response = await fetch(url);
            
            if (!response.ok) throw new Error("File API tidak ditemukan!");

            const data = await response.json();
            const nickname = data.username || (data.data && data.data.username);
            const countryCode = data.country || (data.data && data.data.country);

            if (nickname) {
                if (game === 'emel' && countryCode) {
                    const countryLower = countryCode.toLowerCase();
                    const countryFullName = regionNames.of(countryCode.toUpperCase());
                    resText.innerText = `${nickname} - ${countryFullName} (${countryCode.toUpperCase()})`;
                    flagImg.src = `https://flagcdn.com/w80/${countryLower}.png`;
                    flagImg.classList.remove('hidden');
                } else {
                    resText.innerText = nickname;
                }
                resBox.classList.remove('hidden');
            } else {
                alert("Username tidak ditemukan.");
            }

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'CHECK USERNAME';
        }
    }
</script>
<script>
    async function handleTikTokVideo(url) {
        const content = document.getElementById('socialMediaContent');
        const response = await fetch(`https://api.skylen.my.id/api/tiktok?url=${encodeURIComponent(url)}`);
        const json = await response.json();
        const data = json.data?.response;

        if (!data) throw new Error("Video tidak ditemukan!");

        const videoUrl = data.dl || data.video?.no_watermark || data.dl_hd;
        const title = data.title || "TikTok Video";

        // UI Rapi: Judul tidak kepotong, pakai break-words
        content.innerHTML = `
            <div class="space-y-4 animate__animated animate__fadeIn">
                <div class="px-2 pt-1 text-center">
                    <p class="text-[10px] text-white font-black uppercase italic tracking-tighter leading-tight break-words">
                        ${title}
                    </p>
                </div>
                <div class="relative rounded-[2rem] overflow-hidden border-2 border-emerald-500/30 bg-black/60 shadow-2xl">
                    <video controls class="w-full h-auto block" poster="${data.cover}">
                        <source src="${videoUrl}" type="video/mp4">
                    </video>
                </div>
                <button onclick="forceDownload('${videoUrl}', 'tiktok_video.mp4')" id="dlBtn"
                    class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-center rounded-2xl font-black text-[11px] text-white tracking-widest uppercase shadow-xl transition-all active:scale-95">
                    SAVE VIDEO (NO WM)
                </button>
            </div>`;
    }
</script>
<script>
    async function handleTikTokPhoto(url) {
        const content = document.getElementById('socialMediaContent');
        const response = await fetch(`https://api.skylen.my.id/api/tiktok/v2?url=${encodeURIComponent(url)}`);
        const json = await response.json();
        const data = json.data?.response;

        const slides = data.slides || data.images || [];
        if (slides.length === 0) throw new Error("Bukan konten slide!");

        let imgHtml = slides.map((img, i) => `
            <div class="shrink-0 w-64 snap-center relative">
                <img src="${img}" class="w-full h-auto rounded-2xl border border-white/10 shadow-xl">
                <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-[8px] text-white px-2 py-1 rounded-lg font-bold">#${i+1}</div>
            </div>`).join('');
            
        content.innerHTML = `
            <div class="space-y-4 animate__animated animate__fadeIn">
                <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest ml-1 text-center">📸 Photo Slide (${slides.length})</p>
                <div class="flex overflow-x-auto gap-3 pb-4 hide-scroll snap-x">${imgHtml}</div>
                <p class="text-center text-[9px] text-slate-500 italic">← Geser foto →</p>
            </div>`;
    }
</script>
<script>
    async function downloadSocial() {
        const btn = document.getElementById('btnSocial');
        const type = document.getElementById('socialType').value;
        const urlInput = document.getElementById('socialUrl').value;
        const resBox = document.getElementById('resSocial');

        if (!urlInput) return alert("Linknya mana Bos?");

        btn.disabled = true;
        btn.innerHTML = 'LOADING...';
        resBox.classList.add('hidden');

        try {
            if (type === 'tiktok_video') {
                await handleTikTokVideo(urlInput);
            } else if (type === 'tiktok_photo') {
                await handleTikTokPhoto(urlInput);
            } else {
                alert("Fitur segera hadir!");
            }
            resBox.classList.remove('hidden');
        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'START DOWNLOAD';
        }
    }

    // FUNGSI FORCE DOWNLOAD (VERSI HP STABLE)
    async function forceDownload(url, filename) {
        const btn = document.getElementById('dlBtn');
        const oldText = btn.innerText;
        btn.innerText = "DOWNLOADING...";

        try {
            // Gunakan Proxy untuk bypass CORS
            const proxyUrl = 'https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=604800&url=' + encodeURIComponent(url);
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Network response was not ok");
            
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            
            // Trik khusus HP: Gunakan 'target' dan 'rel' agar browser tidak curiga
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = blobUrl;
            a.download = filename;
            a.rel = 'noopener'; 
            
            document.body.appendChild(a);
            a.click();
            
            // Kasih jeda sedikit sebelum dihapus (penting untuk mobile browser)
            setTimeout(() => {
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            }, 200);

            btn.innerText = "SUCCESS!";
        } catch (e) {
            console.error("Download failed:", e);
            // Fallback terakhir jika Blob gagal di HP: Buka di tab baru (manual save)
            window.location.href = url; 
        } finally {
            setTimeout(() => { btn.innerText = oldText; }, 2000);
        }
    }
</script>
</body>
</html>
