<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyLen - Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --accent: #3b82f6; --emerald: #10b981; }
        body { 
            background: #0f172a; 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: white; font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; margin: 0;
        }

        .main-card {
            animation: entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes entrance { from { opacity: 0; transform: scale(0.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .logo-anim { animation: logoFloat 3s ease-in-out infinite; }
        #zonebox { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s ease; }
        #zonebox.active { max-height: 100px; opacity: 1; margin-bottom: 1rem; }
        
        .dl-result-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-card max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl mb-8">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3 logo-anim inline-block">💎</div>
            <h1 class="text-2xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic uppercase">Game Checker</h1>
        </div>

        <div class="space-y-4">
            <select id="game" class="w-full p-4 rounded-2xl bg-slate-900/60 border border-slate-700 outline-none text-sm appearance-none cursor-pointer">
                <option value="emel">Mobile Legends</option>
                <option value="epep">Free Fire</option>
                <option value="pubg">PUBG Mobile</option>
                <option value="codm">CODM</option>
                <option value="fcmobile">FC Mobile</option>
                <option value="mcgg">Magic Chess Go Go</option>
            </select>
            <input type="text" id="userid" inputmode="numeric" placeholder="User ID" class="w-full p-4 rounded-2xl bg-slate-900/60 border border-slate-700 outline-none text-sm focus:border-blue-500 transition-all">
            <div id="zonebox" class="active">
                <input type="text" id="zoneid" inputmode="numeric" placeholder="Zone ID" class="w-full p-4 rounded-2xl bg-slate-900/60 border border-slate-700 outline-none text-sm focus:border-blue-500 transition-all">
            </div>
            <button onclick="checkUser()" id="btnCheck" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs tracking-widest active:scale-95 transition-all shadow-lg shadow-blue-500/20">PERIKSA AKUN</button>
        </div>

        <div id="resultChecker" class="mt-6 hidden animate__animated animate__fadeIn">
            <div class="bg-slate-900/80 p-5 rounded-3xl border border-blue-500/30 text-center">
                <p id="usernameRes" class="text-xl font-black text-white uppercase italic"></p>
                <div id="flagbox" class="hidden flex justify-center items-center gap-2 mt-2">
                    <img id="flagimg" src="" class="w-6 h-4 rounded-sm">
                    <span id="countryRes" class="text-[10px] font-bold text-slate-500 uppercase"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-card max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-3xl">🎬</span>
            <h2 class="text-xl font-black italic uppercase text-emerald-400">TikTok Downloader</h2>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="tkUrl" placeholder="Paste TikTok Link..." class="w-full p-4 rounded-2xl bg-slate-900/60 border border-slate-700 outline-none text-sm focus:border-emerald-500 transition-all">
                <button onclick="pasteTk()" class="absolute right-4 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity">📋</button>
            </div>
            <button onclick="downloadTikTok()" id="btnDl" class="w-full py-4 bg-emerald-600 rounded-2xl font-black text-xs tracking-widest active:scale-95 transition-all shadow-lg shadow-emerald-500/20 uppercase">Get Media</button>
        </div>

        <div id="resultDl" class="mt-8 hidden space-y-4 animate__animated animate__fadeIn">
            <div class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-2xl">
                <img id="tkAvatar" src="" class="w-10 h-10 rounded-full border border-emerald-500">
                <div>
                    <p id="tkUser" class="text-xs font-black"></p>
                    <p id="tkTitle" class="text-[9px] text-slate-400 line-clamp-1"></p>
                </div>
            </div>

            <div id="tkSlides" class="grid grid-cols-3 gap-2 max-h-60 overflow-y-auto p-1 hidden"></div>

            <div id="tkVideoBox" class="hidden">
                <video id="tkPreview" controls class="w-full rounded-2xl border border-slate-700"></video>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <a id="dlNowm" href="#" target="_blank" class="p-3 bg-slate-800 hover:bg-emerald-600 rounded-xl text-[10px] font-bold text-center transition-all">HD VIDEO</a>
                <a id="dlAudio" href="#" target="_blank" class="p-3 bg-slate-800 hover:bg-emerald-600 rounded-xl text-[10px] font-bold text-center transition-all">MUSIC MP3</a>
            </div>
        </div>
    </div>

    <script>
        // --- GAME CHECKER LOGIC ---
        const gameSel = document.getElementById('game');
        const zb = document.getElementById('zonebox');
        gameSel.onchange = () => zb.className = ['emel', 'mcgg'].includes(gameSel.value) ? 'active' : '';

        async function checkUser() {
            const btn = document.getElementById('btnCheck');
            const id = document.getElementById('userid').value;
            const zone = document.getElementById('zoneid').value;
            if(!id) return;
            
            btn.innerText = "WAIT...";
            try {
                const res = await fetch(`/api/${gameSel.value}?id=${id}${zone ? '&zone='+zone : ''}`);
                const json = await res.json();
                if(json.status === 200) {
                    document.getElementById('usernameRes').innerText = json.username;
                    document.getElementById('resultChecker').classList.remove('hidden');
                    if(json.flag) {
                        document.getElementById('flagimg').src = json.flag;
                        document.getElementById('countryRes').innerText = json.country;
                        document.getElementById('flagbox').classList.remove('hidden');
                    }
                }
            } catch(e) { alert("Error!"); }
            finally { btn.innerText = "PERIKSA AKUN"; }
        }

        // --- TIKTOK LOGIC ---
        function pasteTk() { navigator.clipboard.readText().then(t => document.getElementById('tkUrl').value = t); }

        async function downloadTikTok() {
            const url = document.getElementById('tkUrl').value;
            const btn = document.getElementById('btnDl');
            if(!url) return;

            btn.innerText = "FETCHING...";
            try {
                // Ganti URL ini dengan endpoint API TikTok kamu
                const res = await fetch(`/api/tiktok?url=${encodeURIComponent(url)}`);
                const json = await res.json();
                const d = json.data.response;

                // Setup Author
                document.getElementById('tkAvatar').src = d.author.avatar || d.dlink.profilePic;
                document.getElementById('tkUser').innerText = d.author.username || d.username;
                document.getElementById('tkTitle').innerText = d.title || d.description;

                // Reset Tampilan
                document.getElementById('tkSlides').classList.add('hidden');
                document.getElementById('tkVideoBox').classList.add('hidden');
                document.getElementById('tkSlides').innerHTML = '';

                if(d.type === 'slide' || d.slides.length > 0) {
                    // Jika Slide Foto
                    document.getElementById('tkSlides').classList.remove('hidden');
                    d.slides.forEach(s => {
                        const img = document.createElement('img');
                        img.src = s.url;
                        img.className = 'dl-result-img border border-slate-700 hover:border-emerald-500 transition-all';
                        img.onclick = () => window.open(s.url, '_blank');
                        document.getElementById('tkSlides').appendChild(img);
                    });
                } else {
                    // Jika Video Biasa
                    document.getElementById('tkVideoBox').classList.remove('hidden');
                    document.getElementById('tkPreview').src = d.dl_hd || d.dl;
                }

                // Link Download Utama
                document.getElementById('dlNowm').href = d.dl_hd || d.dl || d.dlink.nowm;
                document.getElementById('dlAudio').href = d.music.id ? d.dl : d.dlink.audio; // Disesuaikan dengan struktur JSON kamu

                document.getElementById('resultDl').classList.remove('hidden');
            } catch(e) { alert("Gagal mengambil data TikTok!"); }
            finally { btn.innerText = "GET MEDIA"; }
        }
    </script>
</body>
</html>
