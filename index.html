<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKYLEN ULTRA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Navigation Tab Style */
        .nav-tab {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .nav-tab.active {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* Input Style */
        .input-field {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: scale(1.01);
        }

        /* Smooth Animation for Zone Input */
        #zoneWrapper {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }
        #zoneWrapper.show {
            max-width: 200px;
            opacity: 1;
            pointer-events: auto;
            margin-left: 0.5rem;
        }

        /* Button Hover */
        .btn-primary {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:active { transform: scale(0.95); }
        
        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>

    <script>
        // Smooth Tab Switcher
        function switchTab(target, btn) {
            // Animasi Keluar
            const current = document.querySelector('.section-content.active');
            current.classList.replace('animate__fadeInRight', 'animate__fadeOutLeft');
            
            setTimeout(() => {
                // Sembunyikan semua
                document.querySelectorAll('.section-content').forEach(s => {
                    s.classList.remove('active', 'animate__fadeOutLeft', 'animate__fadeInRight');
                });
                document.querySelectorAll('.nav-tab').forEach(t => {
                    t.classList.remove('active', 'text-white');
                    t.classList.add('text-slate-400');
                });

                // Tampilkan target dengan animasi masuk
                const targetSec = document.getElementById(target);
                targetSec.classList.add('active', 'animate__fadeInRight');
                btn.classList.add('active', 'text-white');
                btn.classList.remove('text-slate-400');
            }, 200);
        }

        // Logic Animasi Zone ID (Smooth Slide)
        document.getElementById('gameType').addEventListener('change', function() {
            const wrapper = document.getElementById('zoneWrapper');
            const isML = ['emel', 'mcgg'].includes(this.value);
            
            if (isML) {
                wrapper.classList.add('show');
            } else {
                wrapper.classList.remove('show');
            }
        });

        // Dummy Validate Function (Next Step: Masukkan API kamu di sini)
        function validateGame() {
            const btn = document.getElementById('btnCheck');
            const res = document.getElementById('resGame');
            btn.innerHTML = '<span class="animate-spin inline-block mr-2">↻</span> PLEASE WAIT...';
            
            // Contoh munculkan hasil
            setTimeout(() => {
                btn.innerHTML = 'CHECK USERNAME';
                res.classList.remove('hidden');
            }, 1000);
        }
    </script>
<script>
    const regionNames = new Intl.DisplayNames(['en'], {type: 'region'});

    async function validateGame() {
        const btn = document.getElementById('btnCheck');
        const resBox = document.getElementById('resGame');
        const resText = document.getElementById('gameNickname');
        const flagImg = document.getElementById('gameFlag');
        
        let game = document.getElementById('gameType').value; // Ambil value: emel, eafc, dll
        const id = document.getElementById('gameId').value;
        const zone = document.getElementById('gameZone').value;

        if (!id) return alert("User ID wajib diisi!");

        // --- LOGIKA MAPPING NAMA FILE ---
        // Jika pilih eafc, arahkan ke file fcmobile
        let fileName = game;
        if (game === 'eafc') fileName = 'fcmobile'; 
        // --------------------------------

        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin inline-block mr-2">↻</span> PROCESSING...';
        resBox.classList.add('hidden');
        flagImg.classList.add('hidden');

        try {
            // Tembak ke API lokal dengan nama file yang benar
            // Tambahkan .js jika server kamu mewajibkan ekstensi di URL
            let url = `/api/${fileName}?id=${id}`; 
            
            if (zone && ['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

            const response = await fetch(url);
            
            if (!response.ok) throw new Error("File API tidak ditemukan!");

            const data = await response.json();
            const nickname = data.username || (data.data && data.data.username);
            const countryCode = data.country || (data.data && data.data.country);

            if (nickname) {
                if (game === 'emel' && countryCode) {
                    const countryLower = countryCode.toLowerCase();
                    const countryFullName = regionNames.of(countryCode.toUpperCase());
                    resText.innerText = `${nickname} - ${countryFullName} (${countryCode.toUpperCase()})`;
                    flagImg.src = `https://flagcdn.com/w80/${countryLower}.png`;
                    flagImg.classList.remove('hidden');
                } else {
                    resText.innerText = nickname;
                }
                resBox.classList.remove('hidden');
            } else {
                alert("Username tidak ditemukan.");
            }

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'CHECK USERNAME';
        }
    }
</script>
<script>

                </div>
                <div class="relative rounded-[2rem] overflow-hidden border-2 border-emerald-500/30 bg-black/60 shadow-2xl">

</script>
<script>
async function handleTikTokPhoto(url) {
        const content = document.getElementById('socialMediaContent');
        // Pakai API V2 khusus slide
        const response = await fetch(`https://api.skylen.my.id/api/tiktok/v2?url=${encodeURIComponent(url)}`);
        const json = await response.json();
        
        // Cek struktur data asli dari API
        const data = json.data?.response;
        // Pastikan kita ambil array gambarnya dengan benar
        const slides = data?.images || data?.slides || [];

        if (slides.length === 0) throw new Error("Ini bukan konten foto/slide Bos!");

        // Perbaikan Loop: Kita pastikan ambil link stringnya
        let imgHtml = slides.map((img, i) => {
            // Jika img adalah object, ambil propertinya. Jika string, pakai langsung.
            const imgSrc = (typeof img === 'object') ? (img.url || img.dl || img.link) : img;
            
            return `
                <div class="shrink-0 w-64 snap-center relative">
                    <img src="${imgSrc}" class="w-full h-auto rounded-2xl border border-white/10 shadow-xl" loading="lazy">
                    <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-[8px] text-white px-2 py-1 rounded-lg font-bold">#${i+1}</div>
                    
<button 
    onclick="event.stopPropagation(); forceDownload('${imgSrc}', 'tiktok_photo_${i+1}')" 
    class="absolute bottom-2 right-2 p-3 bg-emerald-600/90 hover:bg-emerald-500 rounded-2xl shadow-lg active:scale-90 transition-all z-10">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
    </svg>
</button>                </div>`;
        }).join('');
            
        content.innerHTML = `
            <div class="space-y-4 animate__animated animate__fadeIn">
                <div class="px-2 pt-1 text-center">
                    <p class="text-[10px] text-emerald-400 font-black uppercase tracking-widest leading-tight">
                        📸 TikTok Photo Slide (${slides.length})
                    </p>
                </div>
                
                <div class="flex overflow-x-auto gap-3 pb-4 px-2 hide-scroll snap-x">
                    ${imgHtml}
                </div>
                
                <p class="text-center text-[9px] text-slate-500 italic mt-1">← Geser untuk lihat semua foto →</p>
            </div>`;
    }
</script>
<script>
async function downloadSocial() {
    const btn = document.getElementById('btnSocial');
    const type = document.getElementById('socialType').value;
    const urlInput = document.getElementById('socialUrl').value;
    const resBox = document.getElementById('resSocial');

    if (!urlInput) return alert("Linknya mana Bos?");

    btn.disabled = true;
    btn.innerHTML = 'LOADING...';
    resBox.classList.add('hidden');

try {
        if (type === 'tiktok_video') {
            await handleTikTokVideo(urlInput);
        } else if (type === 'tiktok_photo') {
            await handleTikTokPhoto(urlInput);
        } else if (type === 'instagram') {
            await handleInstagram(urlInput);
        } else if (type === 'facebook') {
            await handleFacebook(urlInput);
        } else if (type === 'yt_mp4') { // Pintu khusus MP4
            await handleYouTubeMP4(urlInput);
        } else if (type === 'twitter') { // <--- TAMBAHKAN INI
            await handleTwitter(urlInput);
        } else if (type === 'videy') { // <--- TAMBAHKAN INI
            await handleVidey(urlInput);
        } else if (type === 'yt_mp3') { // Pintu khusus MP3
            await handleYouTubeMP3(urlInput);
        } else {
            alert("Fitur segera hadir!");
        }
        resBox.classList.remove('hidden');
    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'START DOWNLOAD';
    }
}

    // FUNGSI FORCE DOWNLOAD (VERSI HP STABLE)
async function forceDownload(url, filename) {
    // Cari tombolnya, tapi jangan dipaksa kalau gak ada
    const btn = document.getElementById('dlBtn');
    const oldText = btn ? btn.innerText : "";

    if (btn) btn.innerText = "WAIT...";

    // Arahkan ke Proxy Vercel
    const proxyUrl = `/api/download?url=${encodeURIComponent(url)}&name=${encodeURIComponent(filename)}`;

    try {
        const a = document.createElement('a');
        a.href = proxyUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            if (btn) btn.innerText = "SUCCESS!";
        }, 1000);
    } catch (e) {
        window.location.href = proxyUrl;
    } finally {
        if (btn) {
            setTimeout(() => { btn.innerText = oldText; }, 2000);
        }
    }
}
</script>
    <script>
        async function handleInstagram(url) {
    const content = document.getElementById('socialMediaContent');
    const apiUrl = `https://api.vreden.my.id/api/v1/download/instagram?url=${encodeURIComponent(url)}`;
    
    const response = await fetch(apiUrl);
    const json = await response.json();
    
    if (!json.status || !json.result.data) throw new Error("Konten Instagram tidak ditemukan!");

    const mediaList = json.result.data; // Ini array data
    const username = json.result.profile.username || "Instagram User";
    const caption = json.result.caption.text || "Instagram Post";

    // 1. Header Judul
    let html = `
        <div class="space-y-4 animate__animated animate__fadeIn">
            <div class="px-2 pt-1 text-center">
                <p class="text-[10px] text-white font-black uppercase italic tracking-tighter leading-tight break-words">
                    @${username} - ${caption.substring(0, 60)}...
                </p>
            </div>`;

    // 2. Logika Tampilan (Slide vs Single)
    if (mediaList.length > 1) {
        // TAMPILAN SLIDE (Carousel)
        let slidesHtml = mediaList.map((item, i) => `
            <div class="shrink-0 w-64 snap-center relative">
                <img src="${item.url}" class="w-full h-auto rounded-[2rem] border-2 border-pink-500/20 shadow-xl">
                <div class="absolute top-3 right-3 bg-black/70 backdrop-blur-md text-[9px] text-white px-2 py-1 rounded-full font-bold">
                    ${i + 1}/${mediaList.length}
                </div>
                <button onclick="event.stopPropagation(); forceDownload('${item.url}', 'ig_${username}_${i+1}')" 
                    class="absolute bottom-3 right-3 p-3 bg-pink-600 rounded-2xl shadow-lg active:scale-90 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </button>
            </div>`).join('');

        html += `
            <div class="flex overflow-x-auto gap-4 pb-4 px-2 hide-scroll snap-x">
                ${slidesHtml}
            </div>
            <p class="text-center text-[9px] text-slate-500 italic">← Geser foto Instagram →</p>`;
    } else {
        // TAMPILAN SINGLE (Video atau 1 Foto)
        const item = mediaList[0];
        html += `
            <div class="relative rounded-[2rem] overflow-hidden border-2 border-pink-500/30 bg-black/60 shadow-2xl">
                ${item.type === 'video' ? `
                    <video controls class="w-full h-auto block" poster="${item.thumb}">
                        <source src="${item.url}" type="video/mp4">
                    </video>` : `
                    <img src="${item.url}" class="w-full h-auto block">`}
            </div>
            <button onclick="forceDownload('${item.url}', 'instagram_${username}')" id="dlBtn"
                class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-center rounded-2xl font-black text-[11px] text-white tracking-widest uppercase shadow-xl active:scale-95">
                SAVE ${item.type.toUpperCase()}
            </button>`;
    }

    html += `</div>`;
    content.innerHTML = html;
}
    </script>
    <script>
    async function handleFacebook(url) {
        const content = document.getElementById('socialMediaContent');
        const apiUrl = `https://api.vreden.my.id/api/v1/download/facebook?url=${encodeURIComponent(url)}`;
        
        const response = await fetch(apiUrl);
        const json = await response.json();
        
        if (!json.status || !json.result.download) throw new Error("Video Facebook tidak ditemukan!");

        const data = json.result;
        const hdUrl = data.download.hd;
        const sdUrl = data.download.sd;
        const title = data.title || "Facebook Video";

        content.innerHTML = `
            <div class="space-y-4 animate__animated animate__fadeIn">
                <div class="px-2 pt-1 text-center">

    <script>
async function handleVidey(urlInput) {
    const content = document.getElementById('socialMediaContent');
    
    // Cara manual: Buang semua teks sebelum 'id='
    let videoId = "";
    if (urlInput.includes("id=")) {
        videoId = urlInput.split("id=")[1].split("&")[0];
    } else {
        // Jika user masukin link murni cdn-nya langsung
        videoId = urlInput.split("/").pop().replace(".mp4", "");
    }

    if (!videoId || videoId.length < 5) {
        throw new Error("ID Videy gagal diekstrak. Cek lagi linknya!");
    }

    const cdnUrl = `https://cdn2.videy.co/${videoId}.mp4`;
    
    // Kita arahkan ke Proxy Vercel kamu supaya lolos blokir Referer
    const proxiedUrl = `/api/download?url=${encodeURIComponent(cdnUrl)}&name=videy_${videoId}`;

    content.innerHTML = `

                <span class="bg-teal-500/20 text-teal-500 text-[9px] px-2 py-0.5 rounded-full font-bold tracking-widest uppercase">

    <script>
async function handleTwitter(url) {
    const content = document.getElementById('socialMediaContent');
    
    // ENDPOINT BARU SESUAI TEMUANMU
    const apiUrl = `https://host.optikl.ink/download/x?url=${encodeURIComponent(url)}`;
    
    const response = await fetch(apiUrl);
    if (!response.ok) throw new Error("Gagal terhubung ke Server Optikl!");

    const data = await response.json();
    
    // Validasi data downloads
    if (!data.downloads || !data.downloads.videos) throw new Error("Video tidak ditemukan!");

    // Ambil Kualitas Tertinggi (Index 0 biasanya 1024p)
    const videoHD = data.downloads.videos[0];
    const thumb = data.thumbnail;
    const duration = data.duration;
    const title = data.title || "Twitter Video";

    content.innerHTML = `
        <div class="space-y-4 animate__animated animate__fadeIn">
            <div class="px-2 pt-1 text-center">
                <span class="bg-blue-500/20 text-blue-400 text-[9px] px-2 py-0.5 rounded-full font-bold tracking-widest uppercase">
