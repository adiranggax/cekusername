<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyLen Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: #020617; 
            background-image: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: white; min-height: 100vh; font-family: sans-serif;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }
        #zonebox { display: none; }
        #zonebox.active { display: block; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="max-w-md w-full mt-6 space-y-6">
        
        <div class="text-center mb-8 animate__animated animate__fadeIn">
            <h1 class="text-4xl font-black italic text-blue-500">SKYLEN<span class="text-white">PRO</span></h1>
            <p class="text-slate-400 text-[10px] tracking-widest uppercase">Hybrid System - Fixed Domain</p>
        </div>

        <div class="flex p-1 bg-slate-900/80 rounded-2xl border border-white/5">
            <button onclick="switchTab('game-section')" id="btn-game" class="tab-btn active w-1/2 py-3 rounded-xl text-xs font-bold transition-all">🎮 GAME CHECKER</button>
            <button onclick="switchTab('tk-section')" id="btn-tk" class="tab-btn w-1/2 py-3 rounded-xl text-xs font-bold transition-all text-slate-400">📥 TIKTOK DL</button>
        </div>

        <div id="game-section" class="glass-card p-6 shadow-2xl animate__animated animate__fadeIn">
            <div class="space-y-4">
                <select id="game" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-sm text-white">
                    <option value="emel">Mobile Legends</option>
                    <option value="epep">Free Fire</option>
                    <option value="pubg">PUBG Mobile</option>
                </select>
                <div class="flex gap-2">
                    <input type="text" id="userid" placeholder="User ID" class="flex-1 p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-sm text-white">
                    <div id="zonebox" class="w-1/3 active">
                        <input type="text" id="zoneid" placeholder="Zone" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-sm text-white">
                    </div>
                </div>
                <button onclick="checkUser()" id="btnCheck" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs tracking-widest active:scale-95 transition-all shadow-lg shadow-blue-900/40">VALIDATE ID</button>
            </div>
            <div id="resCheck" class="mt-6 hidden p-4 bg-blue-500/10 border border-blue-500/30 rounded-2xl text-center">
                <p id="userRes" class="text-white font-bold text-xl uppercase tracking-tighter"></p>
            </div>
        </div>

        <div id="tk-section" class="glass-card p-6 shadow-2xl hidden animate__animated animate__fadeIn">
            <div class="space-y-4">
                <input type="text" id="tkUrl" placeholder="Tempel Link TikTok" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-sm text-white focus:border-emerald-500 transition-all">
                <button onclick="downloadTikTok()" id="btnDl" class="w-full py-4 bg-emerald-600 rounded-2xl font-black text-xs tracking-widest active:scale-95 transition-all">GET CONTENT</button>
            </div>

            <div id="resDl" class="mt-6 hidden space-y-4 animate__animated animate__zoomIn">
                <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl border border-white/5">
                    <img id="tkAvatar" src="" class="w-10 h-10 rounded-full border border-emerald-500 shadow-lg">
                    <div class="overflow-hidden">
                        <p id="tkUser" class="text-xs font-bold text-emerald-400 truncate"></p>
                        <p id="tkTitle" class="text-[9px] text-slate-400 truncate"></p>
                    </div>
                </div>

                <div id="tkSlides" class="hidden grid grid-cols-2 gap-2 max-h-72 overflow-y-auto pr-1 custom-scroll"></div>
                <div id="tkVideoBox" class="hidden">
                    <video id="tkPreview" controls class="w-full rounded-xl bg-black border border-white/10 shadow-2xl"></video>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2">
                    <a id="linkVid" href="#" target="_blank" class="p-3 bg-slate-800 text-center rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 transition-all">Download Media</a>
                    <a id="linkAud" href="#" target="_blank" class="p-3 bg-slate-800 text-center rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 transition-all">Download Audio</a>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-600 text-[10px] font-medium tracking-[0.2em] uppercase">© 2026 SkyLen Corporation</p>
    </div>

    <script>
        function switchTab(section) {
            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('tk-section').classList.add('hidden');
            document.getElementById(section).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-white'));
            event.currentTarget.classList.add('active', 'text-white');
        }

        document.getElementById('game').onchange = (e) => {
            document.getElementById('zonebox').style.display = ['emel','mcgg'].includes(e.target.value) ? 'block' : 'none';
        };

        // API KAMU (Game Checker)
        async function checkUser() {
            const btn = document.getElementById('btnCheck');
            const g = document.getElementById('game').value;
            const id = document.getElementById('userid').value;
            const z = document.getElementById('zoneid').value;
            if(!id) return;
            btn.innerText = "WAIT...";
            try {
                const r = await fetch(`/api/${g}?id=${id}${z ? '&zone='+z : ''}`);
                const j = await r.json();
                if(j.username) {
                    document.getElementById('userRes').innerText = j.username;
                    document.getElementById('resCheck').classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
            finally { btn.innerText = "VALIDATE ID"; }
        }

        // API TEMAN (TikTok Downloader - Fixed Domain)
        async function downloadTikTok() {
            const btn = document.getElementById('btnDl');
            const urlInput = document.getElementById('tkUrl').value;
            if(!urlInput) return alert("Tempel link dulu!");
            
            btn.innerText = "FETCHING...";
            document.getElementById('resDl').classList.add('hidden');

            try {
                // 1. Coba panggil V2 dulu (Karena kalau itu foto, kita butuh data slide-nya)
                let response = await fetch(`https://api.skylen.my.id/api/tiktok/v2?url=${encodeURIComponent(urlInput)}`);
                let json = await response.json();
                
                // Jika di V2 tidak ada data slide, coba panggil V1 (Normal Video)
                if (!json.data.response.slides || json.data.response.slides.length === 0) {
                    const responseV1 = await fetch(`https://api.skylen.my.id/api/tiktok?url=${encodeURIComponent(urlInput)}`);
                    json = await responseV1.json();
                }

                const res = json.data.response;

                // Update UI
                document.getElementById('tkAvatar').src = res.author?.avatar || res.dlink?.profilePic || "";
                document.getElementById('tkUser').innerText = res.author?.username || res.username || "SkyLen User";
                document.getElementById('tkTitle').innerText = res.title || res.description || "TikTok Content";

                const sBox = document.getElementById('tkSlides');
                const vBox = document.getElementById('tkVideoBox');
                sBox.classList.add('hidden'); vBox.classList.add('hidden');
                sBox.innerHTML = '';

                // Logika Tampilan (Slide vs Video)
                if (res.slides && res.slides.length > 0) {
                    sBox.classList.remove('hidden');
                    res.slides.forEach(s => {
                        const img = document.createElement('img');
                        img.src = s.url;
                        img.className = 'w-full aspect-square object-cover rounded-xl border border-white/5';
                        sBox.appendChild(img);
                    });
                } else {
                    vBox.classList.remove('hidden');
                    document.getElementById('tkPreview').src = res.dl_hd || res.dl || res.dlink?.nowm || "";
                }

                // Link Download
                document.getElementById('linkVid').href = res.dl_hd || res.dl || res.dlink?.nowm || "#";
                document.getElementById('linkAud').href = res.music?.url || res.dlink?.audio || "#";

                document.getElementById('resDl').classList.remove('hidden');

            } catch(e) {
                alert("Error: " + e.message);
            } finally {
                btn.innerText = "GET CONTENT";
            }
        }
    </script>
</body>
</html>
