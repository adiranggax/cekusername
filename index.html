<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="" type="image/x-icon">
    <title>Mass Adi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Style Judul */
        .title-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Style Waktu & Tanggal */
        .datetime-box {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Tab Container */
        .nav-container { 
            display: flex; 
            background: rgba(15, 23, 42, 0.9); 
            border-radius: 1.5rem; 
            padding: 6px; 
            gap: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 500px;
        }

/* Efek Animasi Tab */
        .nav-tab { 
            flex: 1; 
            padding: 12px 5px; 
            border-radius: 1.2rem; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #64748b; 
            text-align: center;
            cursor: pointer;
            /* Animasi transisi halus di sini */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .nav-tab.active { 
            background: #3b82f6; 
            color: white; 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px); /* Efek angkat dikit pas aktif */
        }

        /* Animasi klik (tekan) */
        .nav-tab:active {
            transform: scale(0.92);
        }
        /* --- CSS UNTUK DROPDOWN FORM GAME --- */
    
    /* Tombol Utama Dropdown */
    #gameSelector {
        background: rgba(15, 23, 42, 0.9) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        padding: 16px !important;
        border-radius: 1.2rem !important;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
    }

    #gameSelector:hover {
        border-color: rgba(59, 130, 246, 0.5);
    }

    /* List Pilihan yang Muncul ke Bawah */
    #gameOptions {
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.2rem;
        margin-top: 8px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    /* Tiap Baris Game di Dropdown */
    #gameOptions div {
        padding: 14px 20px;
        color: #94a3b8;
        font-weight: 700;
        transition: all 0.2s;
    }

    #gameOptions div:hover {
        background: rgba(59, 130, 246, 0.2);
        color: #3b82f6;
    }

    /* Box Kaca Pembungkus Form */
    .glass {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Input Field Biar Gak Putih */
    .input-field {
        background: rgba(15, 23, 42, 0.9) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        outline: none;
    }
        /* Jarak dari tab biar gak nempel */
    #game {
        margin-top: 30px;
        margin-bottom: 30px;
    }

    /* --- FIX UKURAN FORM TETAP (Fixed Height) --- */
    .form-container {
        /* Gue set tinggi minimal biar gak kembang kempis */
        min-height: 480px; 
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* Elemen mulai dari atas */
    }

    /* Area Input ID & Zone */
    .input-group {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        height: 60px; /* Tinggi tetap area input */
    }

    /* Style Input Field Biar Gak Putih Norak */
    .input-field {
        height: 100%; /* Menyesuaikan tinggi input-group */
        background: rgba(15, 23, 42, 0.9) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 1rem !important;
        color: white !important;
        padding: 0 20px !important;
        font-size: 16px;
        font-weight: 600;
        outline: none;
        transition: all 0.3s;
    }

    /* INI KUNCINYA: User ID selalu flex-1 biar nempen tapi gak ngerubah ukuran */
    #gameId {
        flex: 1 !important; 
        width: 100% !important;
    }

    /* Style Zone ID */
    #gameZone {
        width: 110px !important; /* Lebar tetap */
        transition: visibility 0s, opacity 0.3s linear;
    }

    /* --- STYLE BOX HASIL (Baru) --- */
    #resGame {
        background: rgba(59, 130, 246, 0.1);
        border: 2px solid rgba(59, 130, 246, 0.3);
        color: #3b82f6;
        margin-top: 20px;
        padding: 20px;
        border-radius: 1.5rem;
        text-align: center;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    </style>
</head>
<body>

    <h1 class="title-name">Mass Adi</h1>

    <div id="datetime" class="datetime-box">
        Loading waktu...
    </div>

    <div class="nav-container">
        <button class="nav-tab active" onclick="switchTab(this)">Game</button>
        <button class="nav-tab" onclick="switchTab(this)">Download</button>
        <button class="nav-tab" onclick="switchTab(this)">Media</button>
        <button class="nav-tab" onclick="switchTab(this)">Streaming</button>
        <button class="nav-tab" onclick="switchTab(this)">System</button>
    </div>
<section id="game" class="section-content active animate__animated animate__fadeIn">
    <div class="glass p-7 rounded-[2.5rem] max-w-md mx-auto form-container">
        
        <div class="relative mb-6">
            <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2 px-2">Select Game</p>
            <div onclick="toggleGameDropdown()" id="gameSelector" class="input-field flex justify-between items-center cursor-pointer border-blue-500/30">
                <span id="selectedGameText" class="font-bold text-sm uppercase">Mobile Legends</span>
                <span id="gameArrow">▼</span>
            </div>
            </div>

        <input type="hidden" id="gameType" value="emel">

        <div class="input-group mb-6">
            <input type="text" id="gameId" placeholder="User ID" class="input-field">
            <input type="text" id="gameZone" placeholder="Zone ID" class="input-field">
        </div>

        <button onclick="validateGame()" id="btnCheck" class="w-full py-5 bg-blue-600 rounded-2xl font-black text-[13px] tracking-widest uppercase shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
            Check Username
        </button>

        <div id="resGame" class="hidden animate__animated animate__fadeInUp animate__faster">
            <p class="text-[10px] text-blue-300 mb-1">Nickname Found</p>
            <span id="gameNickname" class="text-lg italic text-white"></span>
        </div>

    </div>
</section>
    
    <script> // Fungsi update waktu real-time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateStr = now.toLocaleDateString('id-ID', options);
            const timeStr = now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            document.getElementById('datetime').innerHTML = `${dateStr} | ${timeStr}`;
        }

        // Jalankan waktu setiap detik
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Fungsi pindah tab sederhana
        function switchTab(btn) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
   <script> // Fungsi Dropdown Pilih Game
    function toggleGameDropdown() {
        const menu = document.getElementById('gameOptions');
        const arrow = document.getElementById('gameArrow');
        menu.classList.toggle('hidden');
        arrow.style.transform = menu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    }

// Fungsi Pilih Game (Fix Layout & Magic Chess)
    function selectGame(val, label, el) {
        document.getElementById('gameType').value = val;
        document.getElementById('selectedGameText').innerText = label;
        toggleGameDropdown();

        const zoneInput = document.getElementById('gameZone');
        
        // PENTING: Pake visibility biar layout input User ID GAK GESER
        if (val === 'emel' || val === 'mcgg') {
            zoneInput.style.visibility = 'visible';
            zoneInput.style.opacity = '1';
            zoneInput.placeholder = (val === 'emel') ? "Zone ID" : "Server";
        } else {
            zoneInput.style.visibility = 'hidden'; // Ngilang tapi tetep makan tempat
            zoneInput.style.opacity = '0';
            zoneInput.value = '';
        }
        
        // Sembunyikan hasil lama kalau ganti game
        document.getElementById('resGame').classList.add('hidden');
    }

    // <script> // Fungsi Validasi (Nampilin Hasil)
    async function validateGame() {
        const btn = document.getElementById('btnCheck');
        const resBox = document.getElementById('resGame');
        const resText = document.getElementById('gameNickname');
        
        const game = document.getElementById('gameType').value;
        const id = document.getElementById('gameId').value;
        const zone = document.getElementById('gameZone').value;

        if (!id) return alert("User ID wajib diisi!");

        btn.disabled = true;
        btn.innerText = "WAIT...";
        resBox.classList.add('hidden'); // Sembunyiin box hasil lama

        try {
            const response = await fetch(`/api/${game}?id=${id}${zone ? '&zone='+zone : ''}`);
            const data = await response.json();
            
            // Sesuaikan sama response API lu (username/data.username/nickname)
            const nickname = data.username || (data.data && data.data.username) || data.nickname;
            // Ambil negara kalau MLBB
            const country = data.country || (data.data && data.data.country);

            if (nickname) {
                // Tampilkan hasil di Box Hasil
                resText.innerText = nickname + (country ? ` (${country})` : '');
                resBox.classList.remove('hidden'); // Munculin box hasil
            } else {
                alert("ID Gak Ketemu di Folder API!");
            }
        } catch (err) {
            alert("Error Server!");
        } finally {
            btn.disabled = false;
            btn.innerText = "CHECK USERNAME";
        }
    }
   </script>
    <script>
    // <script> // Fungsi Pilih Game (Fix Magic Chess)
    function selectGame(val, label, el) {
        document.getElementById('gameType').value = val;
        document.getElementById('selectedGameText').innerText = label;
        toggleGameDropdown();

        const zoneInput = document.getElementById('gameZone');
        // MLBB dan MAGIC CHESS pakai Zone ID
        if (val === 'emel' || val === 'mcgg') {
            zoneInput.style.visibility = 'visible'; // Pakai visibility biar layout gak geser
            zoneInput.style.display = 'block';
            zoneInput.placeholder = "Zone ID";
        } else {
            zoneInput.style.display = 'none';
            zoneInput.value = '';
        }
    }
</script>
</body>
</html>
