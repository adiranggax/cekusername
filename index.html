<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            color: white; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
            transform: translateY(-2px);
        }
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        /* Animasi kustom untuk logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="p-5 flex items-center justify-center">
    <div class="max-w-md w-full glass-card p-8 rounded-[2rem] animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4 float-anim">🕹️</div>
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent">
                GAME CHECKER
            </h1>
            <p class="text-slate-400 text-sm mt-2">Cek username akun game kamu</p>
        </div>
        
        <div class="space-y-5">
            <div class="animate__animated animate__fadeInLeft" style="animation-delay: 0.1s">
                <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-2">Game</label>
                <select id="game" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none input-focus transition-all appearance-none cursor-pointer">
                    <option value="emel">Mobile Legends</option>
                    <option value="epep">Free Fire</option>
                    <option value="pubg">PUBG Mobile</option>
                    <option value="codm">CODM</option>
                    <option value="fcmobile">FC Mobile</option>
                    <option value="mcgg">Magic Chess Go Go</option>
                </select>
            </div>

            <div class="animate__animated animate__fadeInLeft" style="animation-delay: 0.2s">
                <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-2">User ID</label>
                <input type="text" id="userid" placeholder="Masukkan ID" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none input-focus transition-all">
            </div>

            <div id="zonebox" class="animate__animated animate__fadeInLeft" style="animation-delay: 0.3s">
                <label class="block text-xs font-bold text-slate-500 uppercase ml-1 mb-2">Zone ID</label>
                <input type="text" id="zoneid" placeholder="Masukkan Zone" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none input-focus transition-all">
            </div>

            <button onclick="checkUser()" id="btnCheck" class="btn-glow w-full py-4 bg-blue-600 rounded-2xl font-bold text-white transition-all active:scale-95 mt-4">
                PERIKSA SEKARANG
            </button>
        </div>

        <div id="result" class="mt-10 hidden">
            <div class="relative p-6 rounded-3xl bg-gradient-to-b from-slate-800 to-slate-900 border border-slate-700 overflow-hidden">
                <div class="absolute top-0 right-0 -mt-4 -mr-4 w-20 h-20 bg-blue-500/10 rounded-full blur-2xl"></div>
                
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest text-center mb-1">Username Found</p>
                <div id="username" class="text-2xl font-black text-center text-white break-words animate__animated"></div>
                
                <div id="flagbox" class="mt-4 flex justify-center items-center gap-3 hidden animate__animated animate__fadeInUp">
                    <div class="h-[2px] w-8 bg-slate-700"></div>
                    <img id="flagimg" src="" class="w-8 h-5 rounded shadow-lg border border-slate-600">
                    <span id="country" class="uppercase text-xs font-black text-slate-400 tracking-tighter"></span>
                    <div class="h-[2px] w-8 bg-slate-700"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameSelect = document.getElementById('game');
        const zoneBox = document.getElementById('zonebox');

        gameSelect.addEventListener('change', () => {
            const needZone = ['emel', 'mcgg'];
            if (needZone.includes(gameSelect.value)) {
                zoneBox.classList.remove('hidden');
                zoneBox.classList.add('animate__fadeIn');
            } else {
                zoneBox.classList.add('hidden');
            }
        });

        async function checkUser() {
            const game = gameSelect.value;
            const id = document.getElementById('userid').value;
            const zone = document.getElementById('zoneid').value;
            const btn = document.getElementById('btnCheck');
            const resDiv = document.getElementById('result');
            const userText = document.getElementById('username');
            const flagBox = document.getElementById('flagbox');

            if (!id) return alert('ID wajib diisi!');

            btn.innerHTML = '<span class="inline-block animate-spin mr-2">🌀</span> Sedang Mengecek...';
            btn.disabled = true;
            resDiv.classList.add('hidden');
            flagBox.classList.add('hidden');

            try {
                let url = `/api/${game}?id=${id}`;
                if (['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 200) {
                    userText.innerText = data.username;
                    resDiv.classList.remove('hidden');
                    resDiv.classList.add('animate__animated', 'animate__zoomIn');
                    
                    // Efek ketik/bounce untuk username
                    userText.classList.add('animate__bounceIn');

                    if (game === 'emel' && data.flag) {
                        document.getElementById('flagimg').src = data.flag;
                        document.getElementById('country').innerText = data.country;
                        flagBox.classList.remove('hidden');
                    }
                } else {
                    alert('Data tidak ditemukan!');
                }
            } catch (err) {
                alert('Server Error!');
            } finally {
                btn.innerText = 'PERIKSA SEKARANG';
                btn.disabled = false;
                // Bersihkan kelas animasi biar bisa diulang
                setTimeout(() => {
                    resDiv.classList.remove('animate__zoomIn');
                    userText.classList.remove('animate__bounceIn');
                }, 1000);
            }
        }
    </script>
</body>
</html>
