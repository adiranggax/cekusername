<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Checker & Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --accent: #3b82f6; }
        body { 
            background: #0f172a; 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: white; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .main-card, .tool-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Logic Zone Box */
        #zonebox {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #zonebox.active { max-height: 120px; opacity: 1; margin-bottom: 1rem; }

        .input-glow:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="main-card max-w-md w-full p-7 rounded-[2.5rem] mb-8 shadow-2xl">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-3xl">🎮</span>
            <h1 class="text-xl font-black tracking-tighter text-blue-400 italic uppercase">User Checker</h1>
        </div>

        <div class="space-y-4">
            <select id="game" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none text-sm appearance-none cursor-pointer input-glow transition-all">
                <option value="emel">Mobile Legends</option>
                <option value="epep">Free Fire</option>
                <option value="pubg">PUBG Mobile</option>
                <option value="mcgg">Magic Chess Go Go</option>
            </select>

            <input type="text" id="userid" placeholder="Enter Player ID" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none text-sm input-glow transition-all">

            <div id="zonebox" class="active">
                <input type="text" id="zoneid" placeholder="Enter Zone ID" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none text-sm input-glow transition-all">
            </div>

            <button onclick="checkUser()" id="btnCheck" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xs tracking-widest text-white transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                CHECK ACCOUNT
            </button>
        </div>

        <div id="result" class="mt-6 hidden animate__animated animate__fadeIn">
            <div class="p-4 rounded-2xl bg-slate-900/80 border border-slate-700 text-center">
                <p id="username" class="text-xl font-black text-emerald-400"></p>
                <div id="flagbox" class="hidden flex justify-center items-center gap-2 mt-2">
                    <img id="flagimg" src="" class="w-6 h-4">
                    <span id="country" class="text-[10px] font-bold text-slate-500 uppercase"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-card max-w-md w-full p-7 rounded-[2.5rem] shadow-2xl">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-3xl">📥</span>
            <h1 class="text-xl font-black tracking-tighter text-emerald-400 italic uppercase">Media Downloader</h1>
        </div>

        <div class="space-y-4">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest ml-1">Support: TikTok, IG, FB, YT</p>
            
            <div class="relative">
                <input type="text" id="dlUrl" placeholder="Paste link video di sini..." class="w-full p-4 pr-12 rounded-2xl bg-slate-900/50 border border-slate-700 outline-none text-sm input-glow transition-all">
                <button onclick="pasteLink()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                    📋
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="download('video')" class="py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold text-[10px] tracking-widest uppercase border border-slate-700 transition-all active:scale-95">
                    🎬 Video
                </button>
                <button onclick="download('audio')" class="py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold text-[10px] tracking-widest uppercase border border-slate-700 transition-all active:scale-95">
                    🎵 Audio (MP3)
                </button>
            </div>
        </div>

        <div id="dlStatus" class="mt-4 hidden text-center animate__animated animate__pulse animate__infinite">
            <p class="text-[10px] font-bold text-blue-400 tracking-widest uppercase italic">Fetching data...</p>
        </div>
    </div>

    <script>
        // --- LOGIC GAME CHECKER ---
        const gameSelect = document.getElementById('game');
        const zoneBox = document.getElementById('zonebox');

        gameSelect.addEventListener('change', () => {
            zoneBox.className = ['emel', 'mcgg'].includes(gameSelect.value) ? 'active' : '';
        });

        async function checkUser() {
            const btn = document.getElementById('btnCheck');
            const id = document.getElementById('userid').value;
            if(!id) return alert("ID Kosong!");
            
            btn.innerText = "CHECKING...";
            btn.disabled = true;

            try {
                const game = gameSelect.value;
                const zone = document.getElementById('zoneid').value;
                let url = `/api/${game}?id=${id}`;
                if(['emel', 'mcgg'].includes(game)) url += `&zone=${zone}`;

                const res = await fetch(url);
                const data = await res.json();

                if(data.status === 200) {
                    document.getElementById('username').innerText = data.username;
                    document.getElementById('result').classList.remove('hidden');
                    if(game === 'emel' && data.flag) {
                        document.getElementById('flagimg').src = data.flag;
                        document.getElementById('country').innerText = data.country;
                        document.getElementById('flagbox').classList.remove('hidden');
                    }
                } else { alert("Not Found!"); }
            } catch(e) { alert("Error!"); }
            finally { btn.innerText = "CHECK ACCOUNT"; btn.disabled = false; }
        }

        // --- LOGIC DOWNLOADER ---
        async function download(type) {
            const urlInput = document.getElementById('dlUrl').value;
            const status = document.getElementById('dlStatus');

            if(!urlInput) return alert("Masukkan link dulu!");

            status.classList.remove('hidden');
            
            // Contoh simulasi: Di sini nanti kamu tembak ke API downloader kamu
            setTimeout(() => {
                status.classList.add('hidden');
                alert(`Fitur Download ${type} sedang disiapkan! Integrasikan dengan API Downloader kamu.`);
            }, 2000);
        }

        async function pasteLink() {
            const text = await navigator.clipboard.readText();
            document.getElementById('dlUrl').value = text;
        }
    </script>
</body>
</html>
